# Alembic Configuration File

[alembic]
# Migration script directory
script_location = alembic

# Database URL (read from environment variable)
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Migration script template
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# Timezone
timezone = UTC

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Format migration scripts
hooks = black, ruff

black.type = console_scripts
black.entrypoint = black

ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = --fix

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
